<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工事中</title>
    <meta property="og:title" content="ボードゲーム一覧">
    <meta property="og:description" content="身内向けボードゲームルールサイト">
    <meta property="og:type" content="website">
    <link rel="stylesheet" href="style.css">
</head>

<body class="bg_pattern Polka_v2">
    <div class="container">
        <h2>一覧</h2>

        <!-- 検索（あとで使う） -->
        <input type="text" id="search" placeholder="いずれ実装したい検索機能">

        <!-- 一覧表示 -->
        <div id="list"></div>

        <!-- モーダル -->
        <div id="modal" class="modal">
            <div class="modal-content">

                <div class="modal-header">

                    <h2 id="modal-title"></h2>

                    <button class="close-btn" onclick="closeModal()">&times;</button>
                </div>

                <div id="modal-description" class="modal-body">
                </div>

            </div>
        </div>
    </div>

    <script src="script.js"></script>

</body>

</html>
